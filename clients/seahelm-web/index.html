<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Seahelm · MQTT 调试台</title>
<!-- 普通静态页(非 Artifact):可直连 WSS/WS broker。mqtt.js 本地 vendored,离线可用。 -->
<script src="./mqtt.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* Sumi 墨 — Seahelm 设计语言(与 HaiTalk 手表/ESP32 同族) */
  :root{
    --night:#181513; --lamp:#221F1B; --lamp2:#2A2621; --stone:#3A352F; --ash:#7A7166;
    --bone:#E8E2D5; --ember:#D86B53; --green:#6B8E5A; --amber:#C6993F; --red:#8E3A2C;
    --serif:'EB Garamond',Georgia,serif;
    --sans:'Inter',system-ui,-apple-system,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  ::selection{background:rgba(216,107,83,.3)}
  body{
    background:#0c0a09;color:var(--bone);font-family:var(--sans);height:100vh;
    display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(130% 130% at 50% 0%, #121010 0%, #0c0a09 55%, #070605 100%);
  }
  /* ── header ─────────────────────────────────────────────── */
  header{display:flex;gap:10px;align-items:center;padding:11px 18px;
    background:rgba(24,21,19,.7);backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(232,226,213,.06);flex-wrap:wrap}
  .wordmark{font-family:var(--serif);font-weight:600;font-size:22px;letter-spacing:.01em;
    color:var(--bone);margin-right:6px}
  .wordmark .sea{color:var(--ember)}
  header input{background:var(--lamp);border:1px solid var(--stone);color:var(--bone);
    border-radius:7px;padding:6px 9px;font-family:var(--mono);font-size:12px;outline:none}
  header input:focus{border-color:var(--ash)}
  header input.url{width:270px} header input.sm{width:92px}
  header button{background:var(--ember);color:#1a1512;border:0;border-radius:7px;
    padding:7px 15px;font-weight:600;cursor:pointer;font-size:13px;font-family:var(--sans);
    transition:filter .15s} header button:hover{filter:brightness(1.08)}
  header button.ghost{background:var(--lamp);color:var(--bone);border:1px solid var(--stone)}
  header button.ghost.on{background:var(--lamp2);border-color:var(--ash)}
  /* ── pairing-first header ───────────────────────────────── */
  .pairzone{display:flex;align-items:center;gap:8px}
  .spacer{flex:1}
  header button.pair-primary{font-weight:600;padding-left:16px;padding-right:16px}
  .chip{display:inline-flex;align-items:center;gap:9px;background:rgba(107,142,90,.12);
    border:1px solid rgba(107,142,90,.38);border-radius:9px;padding:6px 8px 6px 12px;
    font-size:14px;color:var(--bone)}
  .chip .lock{font-size:13px;opacity:.9}
  .chip b{font-family:var(--mono);font-weight:600;letter-spacing:.01em}
  .chip .e2ee{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--green);
    border:1px solid rgba(107,142,90,.4);border-radius:5px;padding:1px 5px}
  .chip .chip-x{background:none;border:0;color:var(--ash);cursor:pointer;font-size:14px;
    line-height:1;padding:2px 4px;border-radius:5px}
  .chip .chip-x:hover{color:var(--ember);background:rgba(216,107,83,.12)}
  .advrow{display:flex;align-items:center;gap:8px}
  .advrow[hidden]{display:none}
  #status{font-family:var(--mono);font-size:11px;letter-spacing:.08em;padding:4px 10px;
    border-radius:6px;margin-left:auto;text-transform:uppercase}
  .st-off{background:rgba(142,58,44,.14);color:#c9755f}
  .st-on{background:rgba(107,142,90,.14);color:var(--green)}
  /* ── layout ─────────────────────────────────────────────── */
  main{flex:1;display:grid;grid-template-columns:312px 1fr 392px;overflow:hidden}
  .col{overflow-y:auto;padding:16px;border-right:1px solid rgba(232,226,213,.05)}
  /* mid column: header/events fixed, feed scrolls, cmdbar pinned to the bottom */
  #midcol{display:flex;flex-direction:column;overflow:hidden}
  #midcol #feed{flex:1 1 auto;min-height:0;overflow-y:auto}
  #midcol .cmdbar{flex:0 0 auto}
  .col::-webkit-scrollbar{width:8px} .col::-webkit-scrollbar-thumb{background:var(--stone);border-radius:4px}
  .col h2{font-family:var(--mono);font-size:10.5px;letter-spacing:.24em;text-transform:uppercase;
    color:var(--ash);margin:2px 0 12px;font-weight:500}
  .col h2:not(:first-child){margin-top:22px}
  /* ── focus glance ───────────────────────────────────────── */
  .glance{background:var(--lamp);border:1px solid rgba(232,226,213,.05);border-radius:16px;
    padding:22px 16px;text-align:center;
    box-shadow:inset 0 1px 0 rgba(232,226,213,.03), 0 8px 24px rgba(0,0,0,.28)}
  .glance .big{font-family:var(--serif);font-weight:600;font-size:60px;line-height:.95;color:var(--bone)}
  .glance .k{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--ash);margin-top:6px}
  .glance .line{font-size:14px;margin-top:12px;color:var(--bone);line-height:1.4}
  .glance .head{font-family:var(--serif);font-size:19px;color:var(--bone)}
  .counts{display:flex;gap:14px;justify-content:center;margin-top:12px;font-family:var(--mono);font-size:12px}
  /* ── tree ───────────────────────────────────────────────── */
  .repo-head{display:flex;align-items:center;gap:8px;margin:14px 0 4px;padding:2px 2px 6px;
    border-bottom:1px solid rgba(232,226,213,.07);
    font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ash)}
  .repo-head:first-child{margin-top:0}
  .wt{margin-bottom:4px;padding-left:4px}
  .wt-head{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:9px}
  .wt-head .wt-label{flex:1;min-width:0}
  .wt-head .wt-title{font-family:var(--serif);font-size:17px;color:var(--bone);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .wt-head .wt-branch{font-family:var(--mono);font-size:11px;color:var(--ash);
    letter-spacing:.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
  .pane-row{display:flex;align-items:center;gap:9px;padding:8px 10px 8px 22px;border-radius:10px;
    cursor:pointer;font-size:14px;transition:background .12s;border:1px solid transparent}
  .pane-row:hover{background:var(--lamp)}
  .pane-row.sel{background:var(--lamp2);border-color:rgba(216,107,83,.35)}
  .dot{width:9px;height:9px;border-radius:50%;flex:none;box-shadow:0 0 8px -1px currentColor}
  .grow{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pid{color:var(--ember);font-family:var(--mono);font-size:12.5px;font-weight:500}
  .agent{color:var(--ash);font-size:13px}
  .badge{font-family:var(--mono);font-size:11px;color:var(--ash)}
  /* ── detail / feed ──────────────────────────────────────── */
  .feed{display:flex;flex-direction:column;gap:9px}
  .msg{max-width:82%;padding:10px 13px;border-radius:14px;font-size:14px;line-height:1.45;word-break:break-word}
  .msg.you{align-self:flex-end;background:var(--lamp2);border:1px solid rgba(216,107,83,.25)}
  .msg.agent{align-self:flex-start;background:var(--lamp);max-width:94%}
  .msg.agent h4{font-family:var(--sans);font-size:14px;font-weight:600;color:var(--bone);margin:10px 0 4px;letter-spacing:.01em}
  .msg.agent p{margin:6px 0}
  .msg.agent ul,.msg.agent ol{margin:6px 0;padding-left:20px}
  .msg.agent li{margin:3px 0}
  .msg.agent strong{color:var(--bone);font-weight:600}
  .msg.agent em{font-style:italic;color:var(--bone)}
  .msg.agent code{font-family:var(--mono);font-size:12px;background:rgba(232,226,213,.09);
    color:#E8C9A8;padding:1px 5px;border-radius:4px;word-break:break-word}
  .msg.agent pre{background:rgba(0,0,0,.32);border:1px solid var(--stone);border-radius:8px;
    padding:10px 12px;margin:8px 0;overflow-x:auto}
  .msg.agent pre code{background:none;color:var(--bone);padding:0;font-size:12px;line-height:1.55;white-space:pre}
  .msg.agent>:first-child{margin-top:0} .msg.agent>:last-child{margin-bottom:0}
  .msg.ask{align-self:flex-start;background:rgba(198,153,63,.12);border:1px solid rgba(198,153,63,.3)}
  .msg.status{align-self:center;color:var(--ash);font-family:var(--mono);font-size:12px;background:none;padding:2px}
  .cmdbar{display:flex;gap:8px;padding:12px 0 2px;border-top:1px solid rgba(232,226,213,.06);margin-top:14px}
  .cmdbar input{flex:1;background:var(--lamp);border:1px solid var(--stone);color:var(--bone);
    border-radius:9px;padding:9px 12px;font-size:14px;font-family:var(--sans);outline:none}
  .cmdbar input:focus{border-color:var(--ember)}
  .cmdbar button{background:var(--ember);color:#1a1512;border:0;border-radius:9px;padding:9px 15px;
    font-weight:600;cursor:pointer;font-family:var(--sans)}
  .cmdbar button.ghost{background:var(--lamp);color:var(--bone);border:1px solid var(--stone)}
  /* ── event overlay ──────────────────────────────────────── */
  .ev{background:linear-gradient(180deg,rgba(216,107,83,.1),transparent),var(--lamp);
    border:1px solid rgba(216,107,83,.4);border-radius:13px;padding:14px;margin-bottom:12px}
  .ev .eb{font-family:var(--mono);font-size:11px;color:var(--ember);text-transform:uppercase;letter-spacing:.16em}
  .ev .prompt{margin:8px 0 4px;font-size:15px;line-height:1.4}
  .ev .opt{display:block;width:100%;text-align:left;background:var(--lamp2);border:1px solid var(--stone);
    color:var(--bone);border-radius:9px;padding:9px 12px;margin-top:7px;cursor:pointer;font-size:14px;
    font-family:var(--sans);transition:border-color .12s}
  .ev .opt:hover{border-color:var(--ember)}
  .ev .opt b{font-family:var(--mono);color:var(--ash);margin-right:8px;font-weight:500}
  /* ── log ────────────────────────────────────────────────── */
  #log{font-family:var(--mono);font-size:11px;line-height:1.5}
  .logline{padding:4px 0;border-bottom:1px solid rgba(232,226,213,.04);white-space:pre-wrap;word-break:break-all}
  .rx{color:#8FA6C4} .tx{color:var(--amber)} .sys{color:var(--ash)}
  .muted{color:var(--ash);font-size:13px;font-style:italic}
  .toolbar{display:flex;gap:7px;margin-bottom:10px}
  .toolbar button{font-family:var(--mono);font-size:11px;padding:4px 9px;background:var(--lamp);
    border:1px solid var(--stone);color:var(--ash);border-radius:6px;cursor:pointer}
  .toolbar button:hover{color:var(--bone);border-color:var(--ash)}
  #detailHead{color:var(--ash)}
</style>
</head>
<body>
  <header>
    <span class="wordmark"><span class="sea">sea</span>helm</span>
    <span class="spacer"></span>
    <!-- hidden manual fields: connect() reads these; pairing overrides them -->
    <span id="advRow" class="advrow" hidden>
      <input class="url" id="broker" value="ws://localhost:8083/mqtt" />
      <input class="sm" id="user" placeholder="user" value="" />
      <input class="sm" id="pass" placeholder="pass" type="password" value="" />
      <input class="sm" id="mac" value="live" title="mac_id" />
    </span>
    <span id="pairZone" class="pairzone"></span>
    <button id="connectBtn">连接</button>
    <button class="ghost" id="dndBtn" title="切换专注勿扰(Do Not Disturb)">DND</button>
    <span id="status" class="st-off">离线</span>
  </header>
  <main>
    <div class="col" id="leftcol">
      <h2>Focus</h2>
      <div id="glance" class="glance"><div class="muted">未连接</div></div>
      <h2>Repos · Worktrees · Panes</h2>
      <div id="tree"></div>
    </div>
    <div class="col" id="midcol">
      <h2 id="detailHead">Pane 详情</h2>
      <div id="events"></div>
      <div id="feed" class="feed"><div class="muted">选择一个 pane</div></div>
      <div class="cmdbar">
        <input id="sendText" placeholder="pane.send_text …(回车发送)" />
        <button id="sendBtn">发送</button>
        <button id="histBtn" class="ghost" title="拉历史">历史</button>
      </div>
    </div>
    <div class="col" id="rightcol" style="border-right:0">
      <h2>报文日志</h2>
      <div class="toolbar">
        <button id="clearLog">清空</button>
        <button id="pubMock">发 mock 快照</button>
      </div>
      <div id="log"></div>
    </div>
  </main>

<script src="./e2ee.js"></script>
<script>
// ── state ─────────────────────────────────────────────────────────────────
const S = {
  client:null, mac:'testmac',
  panes:new Map(), worktrees:new Map(), msgs:new Map(),
  focus:null, dnd:null, sel:null, events:new Map(),
  encKey:null, authPass:null,   // set once a seahelm:// pair link is applied (E2EE on)
};
const STC = { running:'#6B8E5A', waiting:'#C6993F', done:'#6B8E5A',
  failed:'#8E3A2C', idle:'#7A7166', unknown:'#7A7166' };
// SailorStatus rawValue is capitalized (Running/Waiting/Error/Exited/Idle);
// mock uses lowercase (running/waiting/failed/done). Normalize both → STC keys.
function normStatus(s){
  switch(String(s||'').toLowerCase()){
    case 'running': return 'running';
    case 'waiting': return 'waiting';
    case 'error':
    case 'failed':  return 'failed';
    case 'exited':
    case 'done':    return 'done';
    case 'idle':    return 'idle';
    default:        return 'unknown';
  }
}
const stColor = s => STC[normStatus(s)] || STC.unknown;
// pane_id is a UUID (station id); show a short, stable prefix.
const shortId = id => String(id||'').split('-')[0].slice(0,8) || '—';
const esc = s => String(s??'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
// Minimal, self-contained, XSS-safe markdown → HTML (escape first, then structure).
// Handles: ``` code fences, `inline code`, **bold**, *italic*, # headings,
// - / * / 1. lists, blank-line paragraphs. No external lib (CSP/offline safe).
function md(src){
  const e = s => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const inline = s => e(s)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
  const lines = String(src ?? '').replace(/\r/g, '').split('\n');
  let out = '', ul = false, ol = false, code = false, buf = '';
  const closeLists = () => { if (ul) { out += '</ul>'; ul = false; } if (ol) { out += '</ol>'; ol = false; } };
  for (const line of lines) {
    if (/^```/.test(line)) {
      if (code) { out += '<pre><code>' + e(buf) + '</code></pre>'; buf = ''; code = false; }
      else { closeLists(); code = true; }
      continue;
    }
    if (code) { buf += line + '\n'; continue; }
    const h = line.match(/^(#{1,6})\s+(.*)/);
    if (h) { closeLists(); out += '<h4>' + inline(h[2]) + '</h4>'; continue; }
    const uli = line.match(/^\s*[-*]\s+(.*)/);
    if (uli) { if (ol) { out += '</ol>'; ol = false; } if (!ul) { out += '<ul>'; ul = true; } out += '<li>' + inline(uli[1]) + '</li>'; continue; }
    const oli = line.match(/^\s*\d+\.\s+(.*)/);
    if (oli) { if (ul) { out += '</ul>'; ul = false; } if (!ol) { out += '<ol>'; ol = true; } out += '<li>' + inline(oli[1]) + '</li>'; continue; }
    if (line.trim() === '') { closeLists(); continue; }
    closeLists(); out += '<p>' + inline(line) + '</p>';
  }
  closeLists(); if (code) out += '<pre><code>' + e(buf) + '</code></pre>';
  return out;
}
const $ = id => document.getElementById(id);
const base = () => `seahelm/${S.mac}`;

// ── logging ───────────────────────────────────────────────────────────────
function log(dir, topic, payload){
  const el = document.createElement('div');
  el.className = 'logline ' + dir;
  const body = typeof payload === 'string' ? payload : JSON.stringify(payload);
  el.textContent = `${dir.toUpperCase()} ${topic}\n${body}`;
  $('log').prepend(el);
}
function setStatus(on, txt){ const s=$('status'); s.textContent=txt; s.className = on?'st-on':'st-off'; }

// ── connect ───────────────────────────────────────────────────────────────
function connect(){
  if (S.client) { S.client.end(true); S.client=null; }
  S.mac = $('mac').value.trim() || 'testmac';
  const url = $('broker').value.trim();
  // Paired → broker creds are HKDF-derived (username = mac_id, password = hex).
  const opts = { clean:true, connectTimeout:6000, reconnectPeriod:2000,
    username: S.authPass ? S.mac : ($('user').value || undefined),
    password: S.authPass ? S.authPass : ($('pass').value || undefined) };
  log('sys', '(connect)', url + (S.encKey ? ' [E2EE]' : ''));
  const c = wrapClient(mqtt.connect(url, opts));
  S.client = c;
  c.on('connect', () => { setStatus(true,'已连接'); const t=`${base()}/#`; c.subscribe(t,{qos:1});
    log('sys','(subscribe)', t); });
  c.on('reconnect', () => setStatus(false,'重连中…'));
  c.on('close', () => setStatus(false,'离线'));
  c.on('error', e => { setStatus(false,'错误'); log('sys','(error)', String(e)); });
  // Inbound: decrypt before routing (topic = AES-GCM AAD). Empty = retained-delete.
  c.on('message', async (topic, buf) => {
    let raw = buf.toString();
    if (S.encKey && raw) {
      try { raw = await E2EE.open(S.encKey, topic, raw); }
      catch { log('sys', '(decrypt-fail)', topic); return; }
    }
    onMessage(topic, raw);
  });
}

// Transparently seal outbound string payloads (serialized so publish order holds).
function wrapClient(c){
  const rawPub = c.publish.bind(c);
  let chain = Promise.resolve();
  c.publish = (t, p, opts, cb) => {
    if (!S.encKey || typeof p !== 'string') return rawPub(t, p, opts, cb);
    chain = chain.then(async () => rawPub(t, await E2EE.seal(S.encKey, t, p), opts||{}, cb));
    return c;
  };
  return c;
}

// ── pairing ─────────────────────────────────────────────────────────────────
// Apply a `seahelm://pair?...` link: derive broker creds + E2EE key, fill fields,
// persist for next load. This is the whole "login" — no account, no session.
async function applyPair(link){
  const p = E2EE.parsePairURI(link);
  const { password, encKey } = await E2EE.deriveKeys(p.rootBytes);
  S.encKey = encKey; S.authPass = password; S.mac = p.mac;
  $('broker').value = p.broker; $('mac').value = p.mac;
  $('user').value = p.mac; $('pass').value = '';
  localStorage.setItem('seahelm_pair', link);
  log('sys', '(paired)', `${p.mac} · E2EE on`);
  renderPairZone();
}
function pairPrompt(){
  const link = prompt('粘贴 macOS 配对界面的长链接(seahelm://pair?…):', '');
  if (!link) return;
  applyPair(link.trim()).catch(e => alert('配对失败:' + e.message));
}
function clearPair(){
  S.encKey = null; S.authPass = null;
  localStorage.removeItem('seahelm_pair');
  log('sys', '(unpaired)', '回到明文/手填模式');
  renderPairZone();
}
// Reflect pairing state in the header: chip when paired, 配对 button when not.
function renderPairZone(){
  const z = $('pairZone');
  if (S.authPass){
    z.innerHTML = `<span class="chip"><span class="lock">🔒</span><b>${esc(S.mac)}</b>`
      + `<span class="e2ee">E2EE</span>`
      + `<button class="chip-x" id="unpairBtn" title="解除配对">✕</button></span>`;
    $('unpairBtn').onclick = clearPair;
  } else {
    z.innerHTML = `<button id="pairBtn" class="pair-primary" title="粘贴 seahelm:// 配对链接">配对</button>`;
    $('pairBtn').onclick = pairPrompt;
  }
}

// ── inbound routing ────────────────────────────────────────────────────────
function onMessage(topic, raw){
  log('rx', topic, raw);
  let m; try { m = raw ? JSON.parse(raw) : null; } catch { m = raw; }
  const parts = topic.split('/');
  const seg = parts.slice(2);
  if (seg[0]==='pane' && seg[2]==='status'){
    if (!raw) S.panes.delete(seg[1]); else S.panes.set(seg[1], m);
    renderTree();
  } else if (seg[0]==='pane' && seg[2]==='message'){
    pushMsg(seg[1], m); if (S.sel===seg[1]) renderDetail();
  } else if (seg[0]==='pane' && seg[2]==='event'){
    if (!raw) S.events.delete(seg[1]); else S.events.set(seg[1], m);
    if (S.sel===seg[1]) renderDetail(); renderTree();
  } else if (seg[0]==='worktree' && seg[2]==='status'){
    if (!raw) S.worktrees.delete(seg[1]); else S.worktrees.set(seg[1], m); renderTree();
  } else if (seg[0]==='focus'){ S.focus = m; renderGlance();
  } else if (seg[0]==='dnd'){ S.dnd = m;
  } else if (seg[0]==='reply'){
    // history reply → render into the pane feed
    const corr = seg[seg.length-1];
    const pid = histReq.get(corr);
    if (pid && m && m.result && Array.isArray(m.result.messages)){
      // show the most recent conversation turns (user + assistant), newest last
      S.msgs.set(pid, m.result.messages.slice(-10));
      histReq.delete(corr);
      if (S.sel===pid) renderDetail();
    }
  }
}
function pushMsg(pid, m){
  if (!S.msgs.has(pid)) S.msgs.set(pid, []);
  if (m && m.messages){ S.msgs.set(pid, m.messages); return; }
  // Feed = final messages only. A live pane/message event carries EVERY agent
  // event (tool/command lines, status churn) in `last_message`; only a completion
  // event carries `final_message` (the Stop hook's last_assistant_message). Skip
  // the rest so the feed doesn't fill with tool noise. User echoes (kind:'you')
  // are kept so you can see what you sent.
  const finalText = (m.final_message || '').trim();
  if (finalText) { S.msgs.get(pid).push({ kind:'agent', text: finalText }); return; }
  if (m.kind === 'you' && (m.text || '').trim()) { S.msgs.get(pid).push({ kind:'you', text: m.text }); }
}

// ── render ─────────────────────────────────────────────────────────────────
function renderGlance(){
  const f = S.focus; const g=$('glance');
  if (!f){ g.innerHTML='<div class="muted">无 focus</div>'; return; }
  const c = f.counts||{};
  g.innerHTML = `<div class="big">${c.running??'·'}</div><div class="k">running</div>
    <div class="line"><span class="head">${f.headline||''}</span>${f.line?('<br>'+f.line):''}</div>
    <div class="counts">
      ${c.waiting?`<span style="color:var(--amber)">${c.waiting} waiting</span>`:''}
      ${c.failed?`<span style="color:var(--red)">${c.failed} failed</span>`:''}
    </div>`;
}
function renderTree(){
  const t = $('tree'); t.innerHTML='';
  // group by repo (project) → worktree_path → panes
  const repos = new Map();
  for (const [pid,p] of S.panes){
    const repo = p.project || '—';
    if(!repos.has(repo)) repos.set(repo, new Map());
    const wtMap = repos.get(repo);
    const wt = p.worktree_path || p.branch || '—';
    if(!wtMap.has(wt)) wtMap.set(wt, []);
    wtMap.get(wt).push([pid,p]);
  }
  if (!repos.size){ t.innerHTML='<div class="muted">无 pane</div>'; return; }
  for (const [repo,wtMap] of repos){
    const paneCount = [...wtMap.values()].reduce((n,l)=>n+l.length,0);
    const rh=document.createElement('div'); rh.className='repo-head';
    rh.innerHTML=`<span class="grow">${repo}</span><span class="badge">${paneCount}</span>`;
    t.appendChild(rh);
    for (const [wt,list] of wtMap){
      const wrap=document.createElement('div'); wrap.className='wt';
      const head=document.createElement('div'); head.className='wt-head';
      const first = list[0][1];
      // worktree title = worktree dir name (last path segment); branch = git branch
      const wtTitle = (first.worktree_path||wt).split('/').pop() || wt;
      const wtBranch = first.branch || '';
      const branchLine = (wtBranch && wtBranch!==wtTitle)
        ? `<div class="wt-branch">${esc(wtBranch)}</div>` : '';
      head.innerHTML=`<span class="wt-label"><div class="wt-title">${esc(wtTitle)}</div>${branchLine}</span><span class="badge">${list.length}</span>`;
      wrap.appendChild(head);
      for (const [pid,p] of list){
        const row=document.createElement('div'); row.className='pane-row'+(S.sel===pid?' sel':'');
        // pane name = stable pane title, fall back to short pane id (payload UUID)
        const name = (p.title||'').trim() || shortId(p.pane_id||pid);
        row.innerHTML=`<span class="dot" style="color:${stColor(p.status)};background:${stColor(p.status)}"></span>
          <span class="pid grow">${esc(name)}</span><span class="agent">${esc(p.agent_type||'')}</span>
          ${S.events.get(pid)?'<span class="badge" style="color:var(--ember)">●</span>':''}`;
        row.onclick=()=>{ S.sel=pid; renderTree(); renderDetail(); };
        wrap.appendChild(row);
      }
      t.appendChild(wrap);
    }
  }
}
function renderDetail(){
  const pid=S.sel; const head=$('detailHead'); const feed=$('feed'); const ev=$('events');
  ev.innerHTML=''; feed.innerHTML='';
  if(!pid){ head.textContent='Pane 详情'; feed.innerHTML='<div class="muted">选择一个 pane</div>'; return; }
  const p=S.panes.get(pid)||{};
  head.textContent=`${p.project||''} · ${p.branch||''} · ${shortId(p.pane_id||pid)} · ${normStatus(p.status)}`;
  const e=S.events.get(pid);
  if(e){
    const box=document.createElement('div'); box.className='ev';
    const rid = e.question_id || e.suggest_id || '';
    const method = e.type==='question' ? 'question.answer' : 'suggest.pick';
    box.innerHTML=`<div class="eb">${e.type}</div><div class="prompt">${e.prompt||e.message||''}</div>`;
    (e.options||[]).forEach((opt,i)=>{
      const b=document.createElement('button'); b.className='opt'; b.innerHTML=`<b>${i}</b>${opt}`;
      b.onclick=()=>sendCommand(method, e.type==='question'?{question_id:rid,index:i}:{suggest_id:rid,index:i});
      box.appendChild(b);
    });
    ev.appendChild(box);
  }
  const ms=S.msgs.get(pid)||[];
  if(!ms.length && !e) feed.innerHTML='<div class="muted">无消息(点“历史”拉取)</div>';
  ms.forEach(m=>{
    const d=document.createElement('div');
    const k=m.kind||'agent';
    d.className='msg '+(k==='you'?'you':k==='status'?'status':k==='ask'?'ask':'agent');
    // agent/ask final messages are markdown → render; you/status stay plain text
    if (k==='agent'||k==='ask') d.innerHTML=md(m.text||''); else d.textContent=m.text||'';
    feed.appendChild(d);
  });
  feed.scrollTop=feed.scrollHeight;
}

// ── outbound (commands) ─────────────────────────────────────────────────────
let corrN=0;
const histReq = new Map();   // corr → pane_id, to route history replies
function sendCommand(method, params){
  if(!S.client){ alert('未连接'); return; }
  const corr = 'w'+(++corrN);
  const reply_to = `${base()}/reply/web/${corr}`;
  const payload = { method, params, reply_to, corr };
  S.client.subscribe(reply_to,{qos:1});
  S.client.publish(`${base()}/command`, JSON.stringify(payload), {qos:1});
  log('tx', `${base()}/command`, payload);
}
function sendText(){
  const pid=S.sel; if(!pid) return alert('先选 pane');
  const v=$('sendText').value.trim(); if(!v) return;
  // pid is the stable slot key (pane_session_key) — the remote addressing key (§15)
  sendCommand('pane.send_text', {pane_session_key:pid, text:v, enter:true});
  $('sendText').value='';
}
function pullHistory(){
  const pid=S.sel; if(!pid) return alert('先选 pane');
  const corr='h'+(++corrN); const reply_to=`${base()}/reply/web/${corr}`;
  histReq.set(corr, pid);
  S.client.subscribe(reply_to,{qos:1});
  const payload={pane_session_key:pid, limit:10, reply_to, corr};
  S.client.publish(`${base()}/history/request`, JSON.stringify(payload), {qos:1});
  log('tx', `${base()}/history/request`, payload);
}
function toggleDnd(){
  const on = !(S.dnd && S.dnd.on);
  sendCommand('dnd.set', {on, minutes:25});
}

// ── mock publisher (drive UI without Seahelm) ────────────────────────────────
function pubMock(){
  if(!S.client) return alert('未连接');
  const b=base();
  const pub=(t,o,retain=true)=>{ S.client.publish(`${b}/${t}`, JSON.stringify(o), {qos:1, retain}); log('tx',`${b}/${t}`,o); };
  pub('presence', {online:true, seq:1});
  pub('pane/p1/status', {pane_id:'p1',pane_session_key:'seahelm-main-p1',worktree_path:'/repo/seahelm',branch:'main',project:'seahelm',agent_type:'claude',status:'running',last_message:'重排灵动岛卡片间距',seq:2});
  pub('pane/p3/status', {pane_id:'p3',pane_session_key:'seahelm-feat-p3',worktree_path:'/repo/seahelm-feat',branch:'feat-island',project:'seahelm',agent_type:'claude',status:'waiting',last_message:'等你答:覆盖已有分支?',seq:3});
  pub('pane/p8/status', {pane_id:'p8',pane_session_key:'claw-p8',worktree_path:'/repo/claw',branch:'refactor-gateway',project:'claw-api',agent_type:'gemini',status:'failed',last_message:'npm test 3 处断言未过',seq:4});
  pub('worktree/main/status', {worktree_id:'main',worktree_path:'/repo/seahelm',branch:'main',project:'seahelm',status:'running',pane_count:1,seq:5});
  pub('focus', {pane_id:'p3',kind:'blocked',headline:'Claude',line:'覆盖已有分支?',worktree:'feat-island',counts:{running:1,waiting:1,failed:1,total:3},seq:6});
  pub('pane/p3/event', {type:'question',question_id:'q-1',pane_id:'p3',prompt:'覆盖已有分支?会丢弃未提交改动',options:['批准','拒绝'],danger:true,seq:7}, false);
  pub('pane/p1/message', {type:'pane.updated',pane_id:'p1',last_message:'已把卡片间距从 8 调到 12',seq:8}, false);
}

// ── wire ─────────────────────────────────────────────────────────────────────
renderPairZone();   // pairing-first: 配对 button (or paired chip) is the primary control
$('connectBtn').onclick=connect;
// Restore a saved pairing so a reload stays logged in (creds derived, not stored raw).
(function restorePair(){
  const saved = localStorage.getItem('seahelm_pair');
  if (saved) applyPair(saved).catch(()=>localStorage.removeItem('seahelm_pair'));
})();
$('sendBtn').onclick=sendText;
$('sendText').addEventListener('keydown',e=>{ if(e.key==='Enter') sendText(); });
$('histBtn').onclick=pullHistory;
$('dndBtn').onclick=toggleDnd;
$('clearLog').onclick=()=>$('log').innerHTML='';
$('pubMock').onclick=pubMock;
</script>
