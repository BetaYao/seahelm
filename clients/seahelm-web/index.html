<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Seahelm · cockpit</title>
<!-- 普通静态页(非 Artifact):可直连 WSS/WS broker。mqtt.js 本地 vendored,离线可用。 -->
<script src="./mqtt.min.js?v=20260724"></script>
<style>
  /* Bare-TUI cockpit — matches Sources/UI/Shared/SemanticColors.swift (dark) */
  :root{
    --bg:#08222a;
    --panel:#0e2d37;
    --panel2:#103440;
    --text:#cfe0e0;
    --muted:#7fa0a3;
    --line:#96d7e1;
    --accent:#1fc8da;
    --running:#1bb062;
    --waiting:#5b93f0;
    --idle:#557170;
    --danger:#e84635;
    --attention:#e0a458;
    --line-12:rgba(150,215,225,.12);
    --line-20:rgba(150,215,225,.20);
    --line-38:rgba(150,215,225,.38);
    --accent-12:rgba(31,200,218,.12);
    --accent-20:rgba(31,200,218,.20);
    --running-14:rgba(27,176,98,.14);
    --danger-14:rgba(232,70,53,.14);
    --attention-12:rgba(224,164,88,.12);
    --mono:ui-monospace,'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;
    --r:4px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  ::selection{background:var(--accent-20);color:var(--text)}
  body{
    background:var(--bg);color:var(--text);font-family:var(--mono);height:100vh;
    display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased;
    font-size:13px;line-height:1.4;
    background-image:radial-gradient(120% 80% at 50% -10%, #0c303a 0%, var(--bg) 55%);
  }
  /* ── header ─────────────────────────────────────────────── */
  header{display:flex;gap:8px;align-items:center;padding:8px 12px;
    background:rgba(8,34,42,.85);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line-12);flex-wrap:wrap;min-height:40px}
  .wordmark{font-family:var(--mono);font-weight:600;font-size:14px;letter-spacing:.04em;
    color:var(--text);margin-right:4px;text-transform:lowercase}
  .wordmark .sea{color:var(--accent)}
  header input{background:var(--panel);border:1px solid var(--line-20);color:var(--text);
    border-radius:var(--r);padding:5px 8px;font-family:var(--mono);font-size:12px;outline:none}
  header input:focus{border-color:var(--accent)}
  header input.url{width:270px} header input.sm{width:92px}
  header button{background:var(--accent);color:#042028;border:0;border-radius:var(--r);
    padding:5px 12px;font-weight:600;cursor:pointer;font-size:12px;font-family:var(--mono);
    letter-spacing:.02em;transition:filter .12s}
  header button:hover{filter:brightness(1.08)}
  header button.ghost{background:var(--panel);color:var(--text);border:1px solid var(--line-20)}
  header button.ghost.on{background:var(--panel2);border-color:var(--accent);color:var(--accent)}
  .pairzone{display:flex;align-items:center;gap:8px}
  .spacer{flex:1}
  header button.pair-primary{font-weight:600;padding-left:14px;padding-right:14px}
  .chip{display:inline-flex;align-items:center;gap:8px;background:var(--accent-12);
    border:1px solid var(--line-38);border-radius:var(--r);padding:4px 6px 4px 10px;
    font-size:12px;color:var(--text)}
  .chip .lock{font-size:11px;opacity:.85}
  .chip b{font-family:var(--mono);font-weight:600;letter-spacing:.02em}
  .chip .e2ee{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--running);
    border:1px solid rgba(27,176,98,.4);border-radius:3px;padding:1px 4px}
  .chip .chip-x{background:none;border:0;color:var(--muted);cursor:pointer;font-size:13px;
    line-height:1;padding:2px 4px;border-radius:3px;font-family:var(--mono)}
  .chip .chip-x:hover{color:var(--danger);background:var(--danger-14)}
  .advrow{display:flex;align-items:center;gap:8px}
  .advrow[hidden]{display:none}
  #status{font-family:var(--mono);font-size:10px;letter-spacing:.1em;padding:3px 8px;
    border-radius:var(--r);margin-left:auto;text-transform:uppercase}
  .st-off{background:var(--danger-14);color:var(--danger)}
  .st-on{background:var(--running-14);color:var(--running)}
  /* ── layout ─────────────────────────────────────────────── */
  main{flex:1;display:grid;grid-template-columns:300px 1fr 360px;overflow:hidden}
  .col{overflow-y:auto;padding:12px;border-right:1px solid var(--line-12)}
  #midcol{display:flex;flex-direction:column;overflow:hidden}
  #midcol #feed{flex:1 1 auto;min-height:0;overflow-y:auto}
  #midcol .cmdbar{flex:0 0 auto}
  .col::-webkit-scrollbar{width:6px}
  .col::-webkit-scrollbar-thumb{background:var(--line-20);border-radius:3px}
  .col h2{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--muted);margin:2px 0 10px;font-weight:500}
  .col h2:not(:first-child){margin-top:18px}
  .detail-head{display:flex;align-items:center;gap:8px;margin:2px 0 10px;flex:none}
  .detail-head h2{margin:0;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .detail-head button{flex:none;background:var(--panel);color:var(--text);border:1px solid var(--line-20);
    border-radius:var(--r);padding:5px 10px;font-family:var(--mono);font-size:11px;cursor:pointer;font-weight:600}
  .detail-head button:hover{border-color:var(--accent);color:var(--accent)}
  .detail-head button:disabled{opacity:.45;cursor:default;border-color:var(--line-12);color:var(--muted)}
  .feed-more{align-self:center;background:var(--panel);color:var(--text);border:1px solid var(--line-20);
    border-radius:var(--r);padding:6px 14px;font-family:var(--mono);font-size:11px;cursor:pointer;font-weight:600;
    margin:2px 0 8px}
  .feed-more:hover{border-color:var(--accent);color:var(--accent)}
  .feed-more:disabled{opacity:.45;cursor:default;border-color:var(--line-12);color:var(--muted)}
  /* ── First Mate header (matches Mac DashboardOverviewView) ─ */
  #leftcol{display:flex;flex-direction:column;padding:0;overflow:hidden}
  .fm-scroll{flex:1;min-height:0;overflow-y:auto;padding:8px 10px 12px}
  .fm-header{display:flex;align-items:baseline;gap:10px;padding:10px 12px 8px;
    border-bottom:1px solid var(--line-12);flex:none}
  .fm-header .fm-glyph{color:var(--accent);font-size:13px;line-height:1}
  .fm-header .fm-title{font-size:12.5px;font-weight:700;color:var(--text);letter-spacing:.02em}
  .fm-header .fm-sub{font-size:11px;color:var(--muted);margin-left:2px}
  /* pinned bottom like Mac orders zone */
  .fm-suggest{flex:none;max-height:42%;overflow-y:auto;padding:10px 10px 12px;
    border-top:1px solid var(--line-12);background:rgba(8,34,42,.55)}
  .fm-suggest:empty{display:none;padding:0;border:0}
  .fm-suggest .fm-suggest-h{font-size:10px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--muted);margin-bottom:8px}
  /* ── tree ───────────────────────────────────────────────── */
  .repo-head{display:flex;align-items:center;gap:8px;margin:12px 0 4px;padding:2px 2px 6px 0;
    border-bottom:1px solid var(--line-12);
    font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .repo-head:first-child{margin-top:0}
  .repo-swatch{width:3px;height:12px;border-radius:1px;flex:none;background:var(--accent)}
  .wt{margin-bottom:2px;padding-left:2px}
  .wt-head{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:var(--r)}
  .wt-head .wt-label{flex:1;min-width:0}
  .wt-head .wt-title{font-family:var(--mono);font-size:13px;color:var(--text);font-weight:500;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .wt-head .wt-branch{font-family:var(--mono);font-size:10px;color:var(--muted);
    letter-spacing:.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
  .pane-row{display:flex;align-items:center;gap:8px;padding:5px 8px 5px 18px;border-radius:var(--r);
    cursor:pointer;font-size:12px;transition:background .1s;border:1px solid transparent}
  .pane-row:hover{background:var(--panel)}
  .pane-row.sel{background:var(--panel2);border-color:var(--accent-20)}
  .dot{width:7px;height:7px;border-radius:50%;flex:none}
  .grow{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pid{color:var(--accent);font-family:var(--mono);font-size:12px;font-weight:500}
  .agent{color:var(--muted);font-size:11px}
  .badge{font-family:var(--mono);font-size:10px;color:var(--muted)}
  /* ── detail / feed ──────────────────────────────────────── */
  .feed{display:flex;flex-direction:column;gap:6px}
  .msg{max-width:88%;padding:8px 10px;border-radius:var(--r);font-size:12px;line-height:1.45;
    word-break:break-word;border:1px solid var(--line-12)}
  .msg.you{align-self:flex-end;background:var(--panel2);border-color:var(--accent-20)}
  .msg.agent{align-self:flex-start;background:var(--panel);max-width:96%}
  .msg.agent h4{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text);margin:8px 0 4px}
  .msg.agent p{margin:5px 0}
  .msg.agent ul,.msg.agent ol{margin:5px 0;padding-left:18px}
  .msg.agent li{margin:2px 0}
  .msg.agent strong{color:var(--text);font-weight:600}
  .msg.agent em{font-style:italic;color:var(--muted)}
  .msg.agent code{font-family:var(--mono);font-size:11px;background:var(--accent-12);
    color:var(--accent);padding:1px 4px;border-radius:3px;word-break:break-word}
  .msg.agent pre{background:rgba(0,0,0,.28);border:1px solid var(--line-12);border-radius:var(--r);
    padding:8px 10px;margin:6px 0;overflow-x:auto}
  .msg.agent pre code{background:none;color:var(--text);padding:0;font-size:11px;line-height:1.5;white-space:pre}
  .msg.agent>:first-child{margin-top:0} .msg.agent>:last-child{margin-bottom:0}
  .msg.ask{align-self:flex-start;background:var(--attention-12);border-color:rgba(224,164,88,.35)}
  .msg.status{align-self:center;color:var(--muted);font-family:var(--mono);font-size:11px;
    background:none;border:0;padding:2px}
  .msg.term{align-self:stretch;max-width:100%;background:rgba(0,0,0,.28);border-color:var(--line-12);
    font-family:var(--mono);font-size:11px;line-height:1.45;white-space:pre-wrap;word-break:break-word}
  .cmdbar{display:flex;gap:6px;padding:10px 0 0;border-top:1px solid var(--line-12);margin-top:10px}
  .cmdbar input{flex:1;background:var(--panel);border:1px solid var(--line-20);color:var(--text);
    border-radius:var(--r);padding:7px 10px;font-size:12px;font-family:var(--mono);outline:none}
  .cmdbar input:focus{border-color:var(--accent)}
  .cmdbar button{background:var(--accent);color:#042028;border:0;border-radius:var(--r);padding:7px 12px;
    font-weight:600;cursor:pointer;font-family:var(--mono);font-size:12px}
  .cmdbar button.ghost{background:var(--panel);color:var(--text);border:1px solid var(--line-20)}
  /* ── event / suggestion cards ───────────────────────────── */
  .ev{background:var(--panel);border:1px solid var(--attention);
    border-radius:var(--r);padding:10px;margin-bottom:8px}
  .ev .eb{font-family:var(--mono);font-size:10px;color:var(--attention);text-transform:uppercase;letter-spacing:.16em}
  .ev .ev-meta{font-size:10px;color:var(--muted);margin-top:2px}
  .ev .prompt{margin:6px 0 4px;font-size:12px;line-height:1.45}
  .ev .opt{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line-20);
    color:var(--text);border-radius:var(--r);padding:7px 10px;margin-top:5px;cursor:pointer;font-size:12px;
    font-family:var(--mono);transition:border-color .1s}
  .ev .opt:hover{border-color:var(--accent)}
  .ev .opt:first-of-type{background:var(--accent-12);border-color:var(--accent-20)}
  .ev .opt b{font-family:var(--mono);color:var(--muted);margin-right:8px;font-weight:500}
  /* ── log ────────────────────────────────────────────────── */
  #log{font-family:var(--mono);font-size:11px;line-height:1.45}
  .logline{padding:3px 0;border-bottom:1px solid var(--line-12)}
  .ll-head{cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.85}
  .ll-head:hover{opacity:1;color:var(--text)}
  .ll-head::before{content:'▸ ';color:var(--muted)}
  .logline.open .ll-head::before{content:'▾ '}
  .logline.open .ll-head{color:var(--text);opacity:1}
  .ll-body{white-space:pre-wrap;word-break:break-all;margin:3px 0 2px 12px;color:var(--muted)}
  .rx{color:var(--waiting)} .tx{color:var(--attention)} .sys{color:var(--muted)}
  .muted{color:var(--muted);font-size:12px;font-style:normal}
  .toolbar{display:flex;gap:6px;margin-bottom:8px}
  .toolbar button{font-family:var(--mono);font-size:10px;padding:3px 8px;background:var(--panel);
    border:1px solid var(--line-20);color:var(--muted);border-radius:var(--r);cursor:pointer;letter-spacing:.04em}
  .toolbar button:hover{color:var(--text);border-color:var(--line-38)}
  #detailHead{color:var(--muted);letter-spacing:.04em}
</style>
</head>
<body>
  <header>
    <span class="wordmark"><span class="sea">sea</span>helm</span>
    <span class="spacer"></span>
    <!-- hidden manual fields: connect() reads these; pairing overrides them -->
    <span id="advRow" class="advrow" hidden>
      <input class="url" id="broker" value="ws://localhost:28083/mqtt" />
      <input class="sm" id="user" placeholder="user" value="" />
      <input class="sm" id="pass" placeholder="pass" type="password" value="" />
      <input class="sm" id="mac" value="live" title="mac_id" />
    </span>
    <span id="pairZone" class="pairzone"></span>
    <button id="connectBtn">连接</button>
    <button class="ghost" id="dndBtn" title="切换专注勿扰(Do Not Disturb)">DND</button>
    <span id="status" class="st-off">离线</span>
  </header>
  <main>
    <div class="col" id="leftcol">
      <div class="fm-header">
        <span class="fm-glyph">◍</span>
        <span class="fm-title">First mate</span>
        <span class="fm-sub" id="fmSub">0 projects · 0 running</span>
      </div>
      <div class="fm-scroll">
        <div id="tree"></div>
      </div>
      <div class="fm-suggest" id="fmSuggest"></div>
    </div>
    <div class="col" id="midcol">
      <div class="detail-head">
        <h2 id="detailHead">Pane 详情</h2>
        <button id="syncHistBtn" title="同步最新历史到面板" disabled>同步历史</button>
      </div>
      <div id="feed" class="feed"><div class="muted">选择一个 pane</div></div>
      <div class="cmdbar">
        <input id="sendText" placeholder="pane.send_text …(回车发送)" />
        <button id="sendBtn">发送</button>
      </div>
    </div>
    <div class="col" id="rightcol" style="border-right:0">
      <h2>报文日志</h2>
      <div class="toolbar">
        <button id="clearLog">清空</button>
        <button id="pubMock">发 mock 快照</button>
      </div>
      <div id="log"></div>
    </div>
  </main>

<script src="./e2ee.js"></script>
<script>
// ── state ─────────────────────────────────────────────────────────────────
const S = {
  client:null, mac:'testmac',
  panes:new Map(), worktrees:new Map(), msgs:new Map(),
  // pid → { hasMore } — whether older history exists above the loaded window
  histMeta:new Map(),
  focus:null, dnd:null, sel:null, events:new Map(),
  encKey:null, authPass:null,   // set once a seahelm:// pair link is applied (E2EE on)
};
const HIST_PAGE = 20;
const STC = {
  running:'#1bb062', waiting:'#5b93f0', done:'#1bb062',
  failed:'#e84635', idle:'#557170', unknown:'#557170',
};
// DeckColor — same 10-swatch djb2 hash as Sources/UI/Dashboard/DeckColor.swift
const DECK = [0xd97757,0x10a37f,0x8b7fd9,0x4285f4,0x6aa84f,
              0xb07ad9,0xe0a030,0x4aa3a3,0xd96f9a,0x7a9bd9];
function deckColor(name){
  let h = 5381n;
  for (const b of new TextEncoder().encode(String(name||''))) {
    h = (h * 33n + BigInt(b)) & 0xffffffffffffffffn;
  }
  const hex = DECK[Number(h % 10n)].toString(16).padStart(6,'0');
  return '#' + hex;
}
// SailorStatus rawValue is capitalized (Running/Waiting/Error/Exited/Idle);
// mock uses lowercase (running/waiting/failed/done). Normalize both → STC keys.
function normStatus(s){
  switch(String(s||'').toLowerCase()){
    case 'running': return 'running';
    case 'waiting': return 'waiting';
    case 'error':
    case 'failed':  return 'failed';
    case 'exited':
    case 'done':    return 'done';
    case 'idle':    return 'idle';
    default:        return 'unknown';
  }
}
const stColor = s => STC[normStatus(s)] || STC.unknown;
// pane_id is a UUID (station id); show a short, stable prefix.
const shortId = id => String(id||'').split('-')[0].slice(0,8) || '—';
const esc = s => String(s??'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
// Minimal, self-contained, XSS-safe markdown → HTML (escape first, then structure).
// Handles: ``` code fences, `inline code`, **bold**, *italic*, # headings,
// - / * / 1. lists, blank-line paragraphs. No external lib (CSP/offline safe).
function md(src){
  const e = s => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const inline = s => e(s)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
  const lines = String(src ?? '').replace(/\r/g, '').split('\n');
  let out = '', ul = false, ol = false, code = false, buf = '';
  const closeLists = () => { if (ul) { out += '</ul>'; ul = false; } if (ol) { out += '</ol>'; ol = false; } };
  for (const line of lines) {
    if (/^```/.test(line)) {
      if (code) { out += '<pre><code>' + e(buf) + '</code></pre>'; buf = ''; code = false; }
      else { closeLists(); code = true; }
      continue;
    }
    if (code) { buf += line + '\n'; continue; }
    const h = line.match(/^(#{1,6})\s+(.*)/);
    if (h) { closeLists(); out += '<h4>' + inline(h[2]) + '</h4>'; continue; }
    const uli = line.match(/^\s*[-*]\s+(.*)/);
    if (uli) { if (ol) { out += '</ol>'; ol = false; } if (!ul) { out += '<ul>'; ul = true; } out += '<li>' + inline(uli[1]) + '</li>'; continue; }
    const oli = line.match(/^\s*\d+\.\s+(.*)/);
    if (oli) { if (ul) { out += '</ul>'; ul = false; } if (!ol) { out += '<ol>'; ol = true; } out += '<li>' + inline(oli[1]) + '</li>'; continue; }
    if (line.trim() === '') { closeLists(); continue; }
    closeLists(); out += '<p>' + inline(line) + '</p>';
  }
  closeLists(); if (code) out += '<pre><code>' + e(buf) + '</code></pre>';
  return out;
}
const $ = id => document.getElementById(id);
const base = () => `seahelm/${S.mac}`;

// Edge stack (https://gw.seahelm.dev/): always use same-origin WSS.
// Pair links still carry Mac's historical `b=` (often EMQX Cloud); ignore that
// when we're already on the gateway host so Connect doesn't bounce to the old URL.
function edgeBroker() {
  if (location.protocol === 'https:' && /\.(seahelm\.dev|ucar\.cc)$/i.test(location.hostname)) {
    return `wss://${location.host}/mqtt`;
  }
  return null;
}
if ($('broker') && edgeBroker()) $('broker').value = edgeBroker();

// ── logging ───────────────────────────────────────────────────────────────
function log(dir, topic, payload){
  const el = document.createElement('div');
  el.className = 'logline ' + dir;
  const body = typeof payload === 'string' ? payload : JSON.stringify(payload);
  const ts = new Date().toLocaleTimeString('en-GB');   // HH:MM:SS
  const head = document.createElement('div');
  head.className = 'll-head';
  head.textContent = `${ts} ${dir.toUpperCase()} ${topic}`;   // collapsed one-liner
  const bd = document.createElement('div');
  bd.className = 'll-body'; bd.textContent = body; bd.hidden = true;
  head.onclick = () => { bd.hidden = !bd.hidden; el.classList.toggle('open', !bd.hidden); };
  el.appendChild(head); el.appendChild(bd);
  $('log').prepend(el);   // newest on top (reverse-chronological)
}
function setStatus(on, txt){ const s=$('status'); s.textContent=txt; s.className = on?'st-on':'st-off'; }

// ── connect ───────────────────────────────────────────────────────────────
function connect(){
  if (S.client) { S.client.end(true); S.client=null; }
  S.mac = $('mac').value.trim() || 'testmac';
  const edge = edgeBroker();
  if (edge) $('broker').value = edge;
  const url = $('broker').value.trim();
  // Paired → broker creds are HKDF-derived (username = mac_id, password = hex).
  // Self-hosted EMQX currently allows any user/pass (no authenticator yet).
  const opts = { clean:true, connectTimeout:6000, reconnectPeriod:2000,
    username: S.authPass ? S.mac : ($('user').value || undefined),
    password: S.authPass ? S.authPass : ($('pass').value || undefined) };
  log('sys', '(connect)', url + (S.encKey ? ' [E2EE]' : ''));
  const c = wrapClient(mqtt.connect(url, opts));
  S.client = c;
  c.on('connect', () => { setStatus(true,'已连接'); const t=`${base()}/#`; c.subscribe(t,{qos:1});
    log('sys','(subscribe)', t); if (S.sel) setSyncBusy(false); });
  c.on('reconnect', () => setStatus(false,'重连中…'));
  c.on('close', () => { setStatus(false,'离线'); setSyncBusy(false); $('syncHistBtn').disabled = true; });
  c.on('error', e => { setStatus(false,'错误'); log('sys','(error)', String(e)); });
  // Inbound: decrypt before routing (topic = AES-GCM AAD). Empty = retained-delete.
  c.on('message', async (topic, buf) => {
    let raw = buf.toString();
    if (S.encKey && raw) {
      try { raw = await E2EE.open(S.encKey, topic, raw); }
      catch { log('sys', '(decrypt-fail)', topic); return; }
    }
    onMessage(topic, raw);
  });
}

// Transparently seal outbound string payloads (serialized so publish order holds).
function wrapClient(c){
  const rawPub = c.publish.bind(c);
  let chain = Promise.resolve();
  c.publish = (t, p, opts, cb) => {
    if (!S.encKey || typeof p !== 'string') return rawPub(t, p, opts, cb);
    chain = chain.then(async () => rawPub(t, await E2EE.seal(S.encKey, t, p), opts||{}, cb));
    return c;
  };
  return c;
}

// ── pairing ─────────────────────────────────────────────────────────────────
// Apply a `seahelm://pair?...` link: derive broker creds + E2EE key, fill fields,
// persist for next load. This is the whole "login" — no account, no session.
async function applyPair(link){
  const p = E2EE.parsePairURI(link);
  const { password, encKey } = await E2EE.deriveKeys(p.rootBytes);
  S.encKey = encKey; S.authPass = password; S.mac = p.mac;
  $('broker').value = edgeBroker() || p.broker; $('mac').value = p.mac;
  $('user').value = p.mac; $('pass').value = '';
  localStorage.setItem('seahelm_pair', link);
  log('sys', '(paired)', `${p.mac} · E2EE on`);
  renderPairZone();
}
function pairPrompt(){
  const link = prompt('粘贴 macOS 配对界面的长链接(seahelm://pair?…):', '');
  if (!link) return;
  applyPair(link.trim()).catch(e => alert('配对失败:' + e.message));
}
function clearPair(){
  S.encKey = null; S.authPass = null;
  localStorage.removeItem('seahelm_pair');
  log('sys', '(unpaired)', '回到明文/手填模式');
  renderPairZone();
}
// Reflect pairing state in the header: chip when paired, 配对 button when not.
function renderPairZone(){
  const z = $('pairZone');
  if (S.authPass){
    z.innerHTML = `<span class="chip"><span class="lock">🔒</span><b>${esc(S.mac)}</b>`
      + `<span class="e2ee">E2EE</span>`
      + `<button class="chip-x" id="unpairBtn" title="解除配对">✕</button></span>`;
    $('unpairBtn').onclick = clearPair;
  } else {
    z.innerHTML = `<button id="pairBtn" class="pair-primary" title="粘贴 seahelm:// 配对链接">配对</button>`;
    $('pairBtn').onclick = pairPrompt;
  }
}

// ── inbound routing ────────────────────────────────────────────────────────
function onMessage(topic, raw){
  log('rx', topic, raw);
  let m; try { m = raw ? JSON.parse(raw) : null; } catch { m = raw; }
  const parts = topic.split('/');
  const seg = parts.slice(2);
  if (seg[0]==='pane' && seg[2]==='status'){
    if (!raw) S.panes.delete(seg[1]); else S.panes.set(seg[1], m);
    renderTree();
  } else if (seg[0]==='pane' && seg[2]==='message'){
    pushMsg(seg[1], m); if (S.sel===seg[1]) renderDetail();
  } else if (seg[0]==='pane' && seg[2]==='event'){
    if (!raw) S.events.delete(seg[1]); else S.events.set(seg[1], m);
    if (S.sel===seg[1]) renderDetail(); renderTree();
  } else if (seg[0]==='worktree' && seg[2]==='status'){
    if (!raw) S.worktrees.delete(seg[1]); else S.worktrees.set(seg[1], m); renderTree();
  } else if (seg[0]==='focus'){ S.focus = m; // retained for MQTT sync; UI uses First Mate header
  } else if (seg[0]==='dnd'){ S.dnd = m;
  } else if (seg[0]==='reply'){
    // history reply → sync (replace latest page) or load-more (prepend older)
    const corr = seg[seg.length-1];
    const req = histReq.get(corr);
    if (!req || !m) return;
    histReq.delete(corr);
    if (m.ok === false || m.error || !m.result || !Array.isArray(m.result.messages)){
      setSyncBusy(false);
      const btn=document.querySelector('#feed .feed-more');
      if (btn){ btn.disabled=false; btn.textContent='继续加载'; }
      return;
    }
    applyHistoryReply(req, m.result);
  }
}

function msgKey(m){
  if (typeof m.seq === 'number') return 's'+m.seq;
  return 't'+(m.kind||'')+':'+(m.text||'');
}
function oldestSeq(ms){
  let min = null;
  for (const m of ms){
    if (typeof m.seq === 'number' && (min === null || m.seq < min)) min = m.seq;
  }
  return min;
}
function applyHistoryReply(req, result){
  const { pid, mode } = req;
  const incoming = result.messages || [];
  const hasMore = !!result.has_more;
  const prev = S.msgs.get(pid) || [];
  if (mode === 'more'){
    const seen = new Set(prev.map(msgKey));
    const older = incoming.filter(m => !seen.has(msgKey(m)));
    S.msgs.set(pid, older.concat(prev));
  } else {
    // sync: take the latest page as the panel window
    S.msgs.set(pid, incoming.slice());
  }
  S.histMeta.set(pid, { hasMore });
  setSyncBusy(false);
  if (S.sel !== pid) return;
  if (mode === 'more'){
    const feed = $('feed');
    const prevH = feed.scrollHeight;
    const prevTop = feed.scrollTop;
    renderDetail({ stickBottom: false });
    feed.scrollTop = prevTop + (feed.scrollHeight - prevH);
  } else {
    renderDetail({ stickBottom: true });
  }
}
function pushMsg(pid, m){
  if (!S.msgs.has(pid)) S.msgs.set(pid, []);
  if (m && m.messages){ S.msgs.set(pid, m.messages); return; }
  // Feed = final messages only. A live pane/message event carries EVERY agent
  // event (tool/command lines, status churn) in `last_message`; only a completion
  // event carries `final_message` (the Stop hook's last_assistant_message). Skip
  // the rest so the feed doesn't fill with tool noise. User echoes (kind:'you')
  // are kept so you can see what you sent.
  const finalText = (m.final_message || '').trim();
  if (finalText) { S.msgs.get(pid).push({ kind:'agent', text: finalText }); return; }
  if (m.kind === 'you' && (m.text || '').trim()) { S.msgs.get(pid).push({ kind:'you', text: m.text }); }
}

// ── render ─────────────────────────────────────────────────────────────────
// Rollup priority mirrors SailorStatus.priority (waiting > error > exited > running > idle).
const ST_PRI = {waiting:0, failed:1, done:2, running:3, idle:4, unknown:5};
function highestStatus(statuses){
  let best = 'unknown', bestPri = 99;
  for (const s of statuses){
    const n = normStatus(s);
    const p = ST_PRI[n] ?? 4;
    if (p < bestPri){ bestPri = p; best = n; }
  }
  return best;
}
function updateFirstMateHeader(){
  // Mac: "N projects · M running" where projects = worktrees (sailors).
  const byWt = new Map();
  for (const [,p] of S.panes){
    const wt = p.worktree_path || p.branch || p.project || '—';
    if (!byWt.has(wt)) byWt.set(wt, []);
    byWt.get(wt).push(p.status);
  }
  const projects = byWt.size;
  let running = 0;
  for (const statuses of byWt.values()){
    if (highestStatus(statuses) === 'running') running++;
  }
  $('fmSub').textContent = `${projects} projects · ${running} running`;
}
function renderSuggestCard(pid, e){
  const box=document.createElement('div'); box.className='ev';
  const p = S.panes.get(pid)||{};
  const label = (p.title||'').trim() || shortId(p.pane_id||pid);
  const meta = [p.project, p.branch].filter(Boolean).join(' · ');
  const rid = e.question_id || e.suggest_id || '';
  const method = e.type==='question' ? 'question.answer' : 'suggest.pick';
  box.innerHTML=`<div class="eb">${esc(e.type||'suggest')}</div>`
    + `<div class="ev-meta">${esc(label)}${meta?' · '+esc(meta):''}</div>`
    + `<div class="prompt">${esc(e.prompt||e.message||'')}</div>`;
  box.onclick=(ev)=>{ if (ev.target.closest('button')) return; S.sel=pid; renderTree(); renderDetail(); };
  (e.options||[]).forEach((opt,i)=>{
    const b=document.createElement('button'); b.className='opt'; b.innerHTML=`<b>${i}</b>${esc(opt)}`;
    b.onclick=(ev)=>{ ev.stopPropagation();
      S.sel=pid;
      sendCommand(method, e.type==='question'?{question_id:rid,index:i}:{suggest_id:rid,index:i});
    };
    box.appendChild(b);
  });
  return box;
}
function renderSuggestions(){
  const host = $('fmSuggest'); host.innerHTML='';
  if (!S.events.size) return;
  const h=document.createElement('div'); h.className='fm-suggest-h'; h.textContent='Suggestions';
  host.appendChild(h);
  for (const [pid,e] of S.events){
    if (!e) continue;
    host.appendChild(renderSuggestCard(pid, e));
  }
}
function renderTree(){
  updateFirstMateHeader();
  const t = $('tree'); t.innerHTML='';
  // group by repo (project) → worktree_path → panes  (fixed grouping, matches Mac repo mode)
  const repos = new Map();
  for (const [pid,p] of S.panes){
    const repo = p.project || '—';
    if(!repos.has(repo)) repos.set(repo, new Map());
    const wtMap = repos.get(repo);
    const wt = p.worktree_path || p.branch || '—';
    if(!wtMap.has(wt)) wtMap.set(wt, []);
    wtMap.get(wt).push([pid,p]);
  }
  if (!repos.size){ t.innerHTML='<div class="muted">无 pane</div>'; renderSuggestions(); return; }
  for (const [repo,wtMap] of repos){
    const paneCount = [...wtMap.values()].reduce((n,l)=>n+l.length,0);
    const rh=document.createElement('div'); rh.className='repo-head';
    rh.innerHTML=`<span class="repo-swatch" style="background:${deckColor(repo)}"></span>`
      + `<span class="grow">${esc(repo)}</span><span class="badge">${paneCount}</span>`;
    t.appendChild(rh);
    for (const [wt,list] of wtMap){
      const wrap=document.createElement('div'); wrap.className='wt';
      const head=document.createElement('div'); head.className='wt-head';
      const first = list[0][1];
      // worktree title = worktree dir name (last path segment); branch = git branch
      const wtTitle = (first.worktree_path||wt).split('/').pop() || wt;
      const wtBranch = first.branch || '';
      const branchLine = (wtBranch && wtBranch!==wtTitle)
        ? `<div class="wt-branch">${esc(wtBranch)}</div>` : '';
      head.innerHTML=`<span class="wt-label"><div class="wt-title">${esc(wtTitle)}</div>${branchLine}</span><span class="badge">${list.length}</span>`;
      wrap.appendChild(head);
      for (const [pid,p] of list){
        const row=document.createElement('div'); row.className='pane-row'+(S.sel===pid?' sel':'');
        // pane name = stable pane title, fall back to short pane id (payload UUID)
        const name = (p.title||'').trim() || shortId(p.pane_id||pid);
        row.innerHTML=`<span class="dot" style="color:${stColor(p.status)};background:${stColor(p.status)}"></span>
          <span class="pid grow">${esc(name)}</span><span class="agent">${esc(p.agent_type||'')}</span>
          ${S.events.get(pid)?'<span class="badge" style="color:var(--attention)">●</span>':''}`;
        row.onclick=()=>{ S.sel=pid; renderTree(); renderDetail(); };
        wrap.appendChild(row);
      }
      t.appendChild(wrap);
    }
  }
  renderSuggestions();
}
function renderDetail(opts={}){
  const stickBottom = opts.stickBottom !== false;
  const pid=S.sel; const head=$('detailHead'); const feed=$('feed');
  const syncBtn=$('syncHistBtn');
  feed.innerHTML='';
  if(!pid){
    head.textContent='Pane 详情';
    feed.innerHTML='<div class="muted">选择一个 pane</div>';
    syncBtn.disabled = true;
    return;
  }
  const p=S.panes.get(pid)||{};
  head.textContent=`${p.project||''} · ${p.branch||''} · ${shortId(p.pane_id||pid)} · ${normStatus(p.status)}`;
  syncBtn.disabled = !S.client;
  const ms=S.msgs.get(pid)||[];
  const meta=S.histMeta.get(pid) || { hasMore:false };
  // 往回滚到顶部：还有更早历史时，在最上面放「继续加载」
  if (meta.hasMore && ms.length){
    const more=document.createElement('button');
    more.className='feed-more';
    more.textContent='继续加载';
    more.onclick=()=>loadMoreHistory();
    feed.appendChild(more);
  }
  if(!ms.length){
    feed.innerHTML='<div class="muted">无消息(点右上角「同步历史」拉取)</div>';
  } else {
    ms.forEach(m=>{
      const d=document.createElement('div');
      const k=m.kind||'agent';
      d.className='msg '+(k==='you'?'you':k==='status'?'status':k==='ask'?'ask':k==='term'?'term':'agent');
      // agent/ask = markdown; term = plain monospace dump; you/status = plain text
      if (k==='agent'||k==='ask') d.innerHTML=md(m.text||''); else d.textContent=m.text||'';
      feed.appendChild(d);
    });
  }
  if (stickBottom) feed.scrollTop=feed.scrollHeight;
}

// ── outbound (commands) ─────────────────────────────────────────────────────
let corrN=0;
const histReq = new Map();   // corr → { pid, mode:'sync'|'more' }
function sendCommand(method, params){
  if(!S.client){ alert('未连接'); return; }
  const corr = 'w'+(++corrN);
  const reply_to = `${base()}/reply/web/${corr}`;
  const payload = { method, params, reply_to, corr };
  S.client.subscribe(reply_to,{qos:1});
  S.client.publish(`${base()}/command`, JSON.stringify(payload), {qos:1});
  log('tx', `${base()}/command`, payload);
}
function sendText(){
  const pid=S.sel; if(!pid) return alert('先选 pane');
  const v=$('sendText').value.trim(); if(!v) return;
  // pid is the stable slot key (pane_session_key) — the remote addressing key (§15)
  sendCommand('pane.send_text', {pane_session_key:pid, text:v, enter:true});
  $('sendText').value='';
}
function setSyncBusy(busy){
  const btn=$('syncHistBtn');
  if (!btn) return;
  btn.disabled = busy || !S.sel || !S.client;
  btn.textContent = busy ? '同步中…' : '同步历史';
}
function requestHistory(mode, beforeSeq){
  const pid=S.sel; if(!pid) return alert('先选 pane');
  if(!S.client) return alert('未连接');
  const corr='h'+(++corrN); const reply_to=`${base()}/reply/web/${corr}`;
  histReq.set(corr, { pid, mode });
  S.client.subscribe(reply_to,{qos:1});
  const payload={pane_session_key:pid, limit:HIST_PAGE, reply_to, corr};
  if (typeof beforeSeq === 'number') payload.before_seq = beforeSeq;
  setSyncBusy(mode === 'sync');
  S.client.publish(`${base()}/history/request`, JSON.stringify(payload), {qos:1});
  log('tx', `${base()}/history/request`, payload);
}
/** 右上角：拉最新一页写入面板 */
function syncHistory(){ requestHistory('sync'); }
/** 顶部：继续往前翻更早的历史 */
function loadMoreHistory(){
  const pid=S.sel; if(!pid) return;
  const ms=S.msgs.get(pid)||[];
  const before=oldestSeq(ms);
  if (before === null){
    // no seq yet — fall back to a fresh sync window
    requestHistory('sync');
    return;
  }
  const btn=document.querySelector('#feed .feed-more');
  if (btn){ btn.disabled=true; btn.textContent='加载中…'; }
  requestHistory('more', before);
}
function toggleDnd(){
  const on = !(S.dnd && S.dnd.on);
  sendCommand('dnd.set', {on, minutes:25});
}

// ── mock publisher (drive UI without Seahelm) ────────────────────────────────
function pubMock(){
  if(!S.client) return alert('未连接');
  const b=base();
  const pub=(t,o,retain=true)=>{ S.client.publish(`${b}/${t}`, JSON.stringify(o), {qos:1, retain}); log('tx',`${b}/${t}`,o); };
  pub('presence', {online:true, seq:1});
  pub('pane/p1/status', {pane_id:'p1',pane_session_key:'seahelm-main-p1',worktree_path:'/repo/seahelm',branch:'main',project:'seahelm',agent_type:'claude',status:'running',last_message:'重排灵动岛卡片间距',seq:2});
  pub('pane/p3/status', {pane_id:'p3',pane_session_key:'seahelm-feat-p3',worktree_path:'/repo/seahelm-feat',branch:'feat-island',project:'seahelm',agent_type:'claude',status:'waiting',last_message:'等你答:覆盖已有分支?',seq:3});
  pub('pane/p8/status', {pane_id:'p8',pane_session_key:'claw-p8',worktree_path:'/repo/claw',branch:'refactor-gateway',project:'claw-api',agent_type:'gemini',status:'failed',last_message:'npm test 3 处断言未过',seq:4});
  pub('worktree/main/status', {worktree_id:'main',worktree_path:'/repo/seahelm',branch:'main',project:'seahelm',status:'running',pane_count:1,seq:5});
  pub('focus', {pane_id:'p3',kind:'blocked',headline:'Claude',line:'覆盖已有分支?',worktree:'feat-island',counts:{running:1,waiting:1,failed:1,total:3},seq:6});
  pub('pane/p3/event', {type:'question',question_id:'q-1',pane_id:'p3',prompt:'覆盖已有分支?会丢弃未提交改动',options:['批准','拒绝'],danger:true,seq:7}, false);
  pub('pane/p1/message', {type:'pane.updated',pane_id:'p1',last_message:'已把卡片间距从 8 调到 12',seq:8}, false);
}

// ── wire ─────────────────────────────────────────────────────────────────────
renderPairZone();   // pairing-first: 配对 button (or paired chip) is the primary control
$('connectBtn').onclick=connect;
// Restore a saved pairing so a reload stays logged in (creds derived, not stored raw).
(function restorePair(){
  const saved = localStorage.getItem('seahelm_pair');
  if (saved) applyPair(saved).catch(()=>localStorage.removeItem('seahelm_pair'));
})();
$('sendBtn').onclick=sendText;
$('sendText').addEventListener('keydown',e=>{ if(e.key==='Enter') sendText(); });
$('syncHistBtn').onclick=syncHistory;
$('dndBtn').onclick=toggleDnd;
$('clearLog').onclick=()=>$('log').innerHTML='';
$('pubMock').onclick=pubMock;
</script>
