name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    env:
      HAS_CERTIFICATE_SECRETS: ${{ secrets.APPLE_CERTIFICATE_P12 != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_DEVELOPER_IDENTITY != '' }}
      HAS_NOTARY_SECRETS: ${{ secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x86_64
            runner: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.1"

      - name: Import Developer ID certificate
        if: ${{ env.HAS_CERTIFICATE_SECRETS == 'true' }}
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/amux-signing.keychain-db"
          openssl base64 -d -A -out "$CERT_PATH" <<< "$APPLE_CERTIFICATE_P12"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

      - name: Configure notarytool credentials
        if: ${{ env.HAS_NOTARY_SECRETS == 'true' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials "amux-notarytool" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID"

      - name: Build release artifact
        env:
          ARCH: ${{ matrix.arch }}
          SIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
          ENABLE_NOTARIZATION: ${{ env.HAS_CERTIFICATE_SECRETS == 'true' && env.HAS_NOTARY_SECRETS == 'true' && '1' || '0' }}
          NOTARYTOOL_PROFILE: amux-notarytool
        run: ./scripts/package_release.sh

      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: dist/amux-macos-${{ matrix.arch }}.zip
          if-no-files-found: error

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged apps
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/amux-macos-arm64.zip
            dist/amux-macos-x86_64.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## Downloads

            - `amux-macos-arm64.zip`: Apple Silicon
            - `amux-macos-x86_64.zip`: Intel

            Artifacts are notarized when the required Apple signing secrets are configured in this repository.
