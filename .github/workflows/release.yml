name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # GhosttyKit is the dominant cost of a release (~7.5 min from source) and its
  # macOS slice is universal, so both arch jobs consume the identical artifact.
  # Building it once here instead of inside the matrix halves that cost, and
  # keeps the two arch jobs from racing to save the same cache key (the loser's
  # save is silently dropped).
  ghostty:
    name: GhosttyKit
    runs-on: macos-14
    timeout-minutes: 60
    outputs:
      sha: ${{ steps.ghostty.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Must match the arch jobs: Ghostty's cimport of CoreVideo fails to find
      # kCVPixelFormatType_30RGB_r210 against a newer SDK than 16.1's.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.1"

      - name: Resolve Ghostty commit
        id: ghostty
        run: echo "sha=$(git ls-tree HEAD ghostty | awk '{print $3}')" >> "$GITHUB_OUTPUT"

      - name: Cache GhosttyKit.xcframework
        id: cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/seahelm/ghosttykit
          key: ghosttykit-${{ steps.ghostty.outputs.sha }}
          # A miss on the exact sha still restores the previous build, so zig
          # reuses its intermediates instead of starting cold.
          restore-keys: ghosttykit-

      - name: Install Zig
        if: steps.cache.outputs.cache-hit != 'true'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build GhosttyKit.xcframework
        run: ./scripts/setup.sh

  build:
    name: Build ${{ matrix.arch }}
    needs: ghostty
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    env:
      HAS_CERTIFICATE_SECRETS: ${{ secrets.APPLE_CERTIFICATE_P12 != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_DEVELOPER_IDENTITY != '' }}
      HAS_NOTARY_SECRETS: ${{ secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          # macos-13 was the last Intel runner and was retired in Dec 2025, so the
          # x86_64 slice is cross-compiled on Apple Silicon. GhosttyKit's macOS
          # slice is universal (macos-arm64_x86_64), so it links either way.
          - arch: x86_64
            runner: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.1"

      - name: Import Developer ID certificate
        if: ${{ env.HAS_CERTIFICATE_SECRETS == 'true' }}
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/seahelm-signing.keychain-db"
          openssl base64 -d -A -out "$CERT_PATH" <<< "$APPLE_CERTIFICATE_P12"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

      - name: Configure notarytool credentials
        if: ${{ env.HAS_NOTARY_SECRETS == 'true' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials "seahelm-notarytool" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID"

      - name: Restore GhosttyKit
        # The `ghostty` job has already populated this key, so this is a hit.
        # Restore-only: the arch jobs must never race to write it. Artifacts
        # would be the obvious alternative, but upload-artifact flattens the
        # symlinks inside an xcframework.
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/seahelm/ghosttykit
          key: ghosttykit-${{ needs.ghostty.outputs.sha }}
          fail-on-cache-miss: true

      - name: Link GhosttyKit
        # Cache is populated, so this only symlinks it into the repo and syncs
        # ghostty.h — no zig, no build.
        run: ./scripts/setup.sh

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ hashFiles('**/Package.resolved', 'project.yml') }}
          restore-keys: spm-

      - name: Build release artifact
        env:
          ARCH: ${{ matrix.arch }}
          # The tag being released, so the app reports the version it shipped as.
          # workflow_dispatch has no tag; the build then keeps project.yml's value.
          RELEASE_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          SIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
          ENABLE_NOTARIZATION: ${{ env.HAS_CERTIFICATE_SECRETS == 'true' && env.HAS_NOTARY_SECRETS == 'true' && '1' || '0' }}
          NOTARYTOOL_PROFILE: seahelm-notarytool
        run: ./scripts/package_release.sh

      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: dist/seahelm-macos-${{ matrix.arch }}.zip
          if-no-files-found: error

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged apps
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/seahelm-macos-arm64.zip
            dist/seahelm-macos-x86_64.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## Install

            ### macOS (one-line install)

            ```bash
            curl -fsSL https://raw.githubusercontent.com/BetaYao/seahelm/main/scripts/install.sh | sh
            ```

            ### macOS (manual)

            1. Download the zip for your Mac below and unpack it
               - `seahelm-macos-arm64.zip`: Apple Silicon
               - `seahelm-macos-x86_64.zip`: Intel
            2. Drag `Seahelm.app` into `/Applications`
            3. If macOS blocks the app on first launch, run:
               ```bash
               xattr -dr com.apple.quarantine /Applications/Seahelm.app
               ```
            4. Launch Seahelm

            Artifacts are notarized when the required Apple signing secrets are configured in this repository; the quarantine step is only needed for un-notarized builds.
