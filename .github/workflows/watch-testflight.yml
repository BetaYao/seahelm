name: Watch TestFlight

# Manual or tag-triggered only — both require write access to this repo, so a
# public-repo fork/PR can never reach this workflow or its secrets (GitHub
# never exposes secrets to fork-triggered pull_request runs, but we avoid that
# whole class of trigger entirely by not listening on pull_request at all).
on:
  workflow_dispatch:
  push:
    tags:
      - "watch-v*"

jobs:
  release:
    name: Archive + Upload
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # App Store Connect rejects uploads built with an SDK older than iOS 26
      # (Xcode 26), which macos-14 runners don't carry — macos-15 does.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      # xcodebuild's -allowProvisioningUpdates talks to App Store Connect
      # directly with this key to fetch/create whatever cert + profile it
      # needs, so no .p12 / provisioning profile secrets have to be stored.
      - name: Install App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      # App Store Connect rejects a duplicate build number, so every run gets
      # a fresh one from the run number instead of a hand-bumped constant.
      - name: Bump build number
        run: |
          cd apple-watch
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*;/CURRENT_PROJECT_VERSION = ${GITHUB_RUN_NUMBER};/g" apple-watch.xcodeproj/project.pbxproj

      - name: Archive
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          cd apple-watch
          xcodebuild -project apple-watch.xcodeproj \
            -scheme "apple-watch Watch App" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/watch.xcarchive" \
            -destination "generic/platform=watchOS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            archive

      - name: Export
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          cat > "$RUNNER_TEMP/exportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>43G5A6G9QV</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>destination</key>
              <string>export</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/watch.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/exportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          # altool can exit 0 even when ASC rejects the package — capture output
          # and fail the job explicitly so a green CI never means a failed upload.
          set -o pipefail
          LOG="$RUNNER_TEMP/altool-upload.log"
          if ! xcrun altool --upload-app \
            -f "$RUNNER_TEMP/export/apple-watch.ipa" \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" 2>&1 | tee "$LOG"; then
            echo "::error::altool exited non-zero"
            exit 1
          fi
          if grep -q "UPLOAD FAILED" "$LOG" || grep -q "Validation failed" "$LOG"; then
            echo "::error::ASC rejected the upload (see altool log above)"
            exit 1
          fi
          if ! grep -q "UPLOAD SUCCEEDED" "$LOG"; then
            echo "::error::altool did not report UPLOAD SUCCEEDED"
            exit 1
          fi
