# Seahelm terminal defaults. User overrides in
# ~/.config/seahelm/ghostty.conf are loaded after this file.
font-family = ""
font-family-bold = ""
font-family-italic = ""
font-family-bold-italic = ""
font-family = JetBrains Mono
# JetBrains Mono has no CJK glyphs, so Chinese/Japanese/Korean text falls back
# to whatever Ghostty's automatic discovery picks — which varies by machine and
# rendered wrong on customer installs. Pin an explicit CJK fallback that ships
# on every macOS (PingFang SC, 10.11+) so the fallback is deterministic. Latin
# still comes from JetBrains Mono above; this only serves glyphs it lacks.
# Users can still override the whole chain in ~/.config/seahelm/ghostty.conf.
font-family = PingFang SC
