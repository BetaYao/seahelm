name: seahelm
options:
  bundleIdPrefix: com.seahelm
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.1"
  minimumXcodeGenVersion: "2.40"
  defaultConfig: Debug

packages:
  CodeEditSourceEditor:
    url: https://github.com/CodeEditApp/CodeEditSourceEditor
    exactVersion: 0.15.2
  # Fork of CodeEditApp/CodeEditLanguages that links only the tree-sitter grammars
  # this app needs. Upstream's CodeLanguage.tsLanguage switch names all ~50, which
  # pulls every member of the static grammar archive into the binary — 95.7 MB of a
  # 138 MB release build. The fork returns nil for 12 unused languages (they still
  # render, as plain text); everything else is untouched.
  #
  # Tagged 0.1.20 on the fork because CodeEditSourceEditor pins that version exactly,
  # and SPM resolves both to the same package identity.
  CodeEditLanguages:
    url: https://github.com/BetaYao/CodeEditLanguages
    exactVersion: 0.1.20

targets:
  seahelm:
    type: application
    platform: macOS
    dependencies:
      - package: CodeEditSourceEditor
        product: CodeEditSourceEditor
      - package: CodeEditLanguages
        product: CodeEditLanguages
    preBuildScripts:
      - name: "Embed and sign bundled zmx"
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          RES="${CODESIGNING_FOLDER_PATH}/Contents/Resources/bin"
          "${SRCROOT}/scripts/fetch-zmx.sh" "${RES}/zmx"
          if [ "${CODE_SIGNING_ALLOWED:-YES}" = "YES" ] && [ -n "${EXPANDED_CODE_SIGN_IDENTITY:-}" ]; then
            # Release builds need a secure timestamp for notarization; skip it in
            # Debug so local builds don't pay a network round-trip per sign.
            TS="--timestamp"
            [ "${CONFIGURATION:-Debug}" = "Debug" ] && TS="--timestamp=none"
            codesign --force --options runtime $TS \
              --sign "${EXPANDED_CODE_SIGN_IDENTITY}" "${RES}/zmx"
          fi
    postBuildScripts:
      # libghostty derives TERMINFO as a SIBLING of GHOSTTY_RESOURCES_DIR
      # (dirname(resources_dir)/terminfo — see ghostty/src/termio/Exec.zig).
      # Our terminfo ships inside Resources/ghostty/terminfo, so mirror it to
      # Resources/terminfo or TERM=xterm-ghostty is unresolvable on machines
      # without a standalone Ghostty.app install (garbled ZLE redraws).
      - name: "Mirror terminfo beside ghostty resources"
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          RES="${CODESIGNING_FOLDER_PATH}/Contents/Resources"
          rm -rf "${RES}/terminfo"
          cp -R "${RES}/ghostty/terminfo" "${RES}/terminfo"
    sources:
      - path: Sources
        type: group
      - path: Resources/Fonts
      - path: Resources/ghostty.conf
      - path: Assets.xcassets
      - path: Resources/licenses
        type: folder
        buildPhase: resources
      - path: Resources/Manifests
        type: folder
        buildPhase: resources
      # Ghostty themes/terminfo — required for light/dark `theme = light:…,dark:…` switching.
      - path: Resources/ghostty
        type: folder
        buildPhase: resources
      - path: ghostty.h
        type: file
        buildPhase: none
      - path: seahelm-Bridging-Header.h
        type: file
        buildPhase: none
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.seahelm.app
        # Drives the bundle name, the executable, and CFBundleName — i.e. what the
        # menu bar, About box and Finder all call the app. The target/scheme stay
        # lowercase so seahelm.xcodeproj and every documented build command keep
        # working; only the product users see is capitalised.
        PRODUCT_NAME: Seahelm
        # The Swift module name defaults to PRODUCT_NAME, which would rename the
        # module to `Seahelm` and break `@testable import seahelm` in every test
        # file. Pin it: the module is an internal name, and capitalising the app is
        # a user-facing change that has no business churning imports.
        PRODUCT_MODULE_NAME: seahelm
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "2.0.17"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        COMBINE_HIDPI_IMAGES: YES
        SWIFT_OBJC_BRIDGING_HEADER: "$(PROJECT_DIR)/seahelm-Bridging-Header.h"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/GhosttyKit.xcframework/macos-arm64_x86_64"
        OTHER_LDFLAGS:
          - "-lghostty"
          - "-lc++"
          - "-framework"
          - Metal
          - "-framework"
          - QuartzCore
          - "-framework"
          - IOSurface
          - "-framework"
          - UniformTypeIdentifiers
          - "-framework"
          - Carbon
      configs:
        Release:
          # package_release.sh runs `xcodebuild build`, not `install`, so Xcode's
          # default STRIP_INSTALLED_PRODUCT never fires and the shipped binary kept
          # its full symbol table — 14 MB of the zip. Strip explicitly instead.
          # non-global keeps exported symbols, so crash reports still symbolicate
          # against the linked frameworks.
          DEPLOYMENT_POSTPROCESSING: YES
          STRIP_INSTALLED_PRODUCT: YES
          STRIP_STYLE: non-global

  seahelmTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        type: group
    dependencies:
      - target: seahelm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.seahelm.tests
        GENERATE_INFOPLIST_FILE: YES
        # XcodeGen derives TEST_HOST from the *target* name, assuming PRODUCT_NAME
        # matches it. Ours doesn't — the target stays `seahelm` so the scheme and
        # every documented xcodebuild command keep working, while the product users
        # see is `Seahelm`. Without this override the generated host path points at
        # a bundle that is never built and `xcodebuild test` cannot launch.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Seahelm.app/Contents/MacOS/Seahelm"

  seahelmUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: UITests
        type: group
    dependencies:
      - target: seahelm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.seahelm.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: seahelm
