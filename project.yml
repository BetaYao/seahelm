name: seahelm
options:
  bundleIdPrefix: com.seahelm
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.1"
  minimumXcodeGenVersion: "2.40"
  defaultConfig: Debug

packages:
  CodeEditSourceEditor:
    url: https://github.com/CodeEditApp/CodeEditSourceEditor
    exactVersion: 0.15.2
  CodeEditLanguages:
    url: https://github.com/CodeEditApp/CodeEditLanguages
    exactVersion: 0.1.20

targets:
  seahelm:
    type: application
    platform: macOS
    dependencies:
      - package: CodeEditSourceEditor
        product: CodeEditSourceEditor
      - package: CodeEditLanguages
        product: CodeEditLanguages
    preBuildScripts:
      - name: "Embed and sign bundled zmx"
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          RES="${CODESIGNING_FOLDER_PATH}/Contents/Resources/bin"
          "${SRCROOT}/scripts/fetch-zmx.sh" "${RES}/zmx"
          if [ "${CODE_SIGNING_ALLOWED:-YES}" = "YES" ] && [ -n "${EXPANDED_CODE_SIGN_IDENTITY:-}" ]; then
            codesign --force --options runtime --timestamp=none \
              --sign "${EXPANDED_CODE_SIGN_IDENTITY}" "${RES}/zmx"
          fi
    sources:
      - path: Sources
        type: group
      - path: Resources/Fonts
      - path: Assets.xcassets
      - path: Resources/licenses
        type: folder
        buildPhase: resources
      - path: ghostty.h
        type: file
        buildPhase: none
      - path: seahelm-Bridging-Header.h
        type: file
        buildPhase: none
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.seahelm.app
        PRODUCT_NAME: seahelm
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        COMBINE_HIDPI_IMAGES: YES
        SWIFT_OBJC_BRIDGING_HEADER: "$(PROJECT_DIR)/seahelm-Bridging-Header.h"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/GhosttyKit.xcframework/macos-arm64_x86_64"
        OTHER_LDFLAGS:
          - "-lghostty"
          - "-lc++"
          - "-framework"
          - Metal
          - "-framework"
          - QuartzCore
          - "-framework"
          - IOSurface
          - "-framework"
          - UniformTypeIdentifiers
          - "-framework"
          - Carbon

  seahelmTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        type: group
    dependencies:
      - target: seahelm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.seahelm.tests
        GENERATE_INFOPLIST_FILE: YES

  seahelmUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: UITests
        type: group
    dependencies:
      - target: seahelm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.seahelm.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: seahelm
